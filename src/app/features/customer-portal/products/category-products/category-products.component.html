<div class="category-container">


    <div class="category-header">

        <h1>
            Browse Categories
        </h1>


        <p>
            Find products according to your needs
        </p>

    </div>





    <!-- Loading -->

    <div 
    class="loading"
    *ngIf="loading">

        Loading categories...

    </div>





    <!-- Category Cards -->

    <div 
    class="category-grid"
    *ngIf="!loading">



        <div 
        class="category-card"
        *ngFor="let category of categories">



            <div class="category-icon">

                🛒

            </div>




            <h2>

                {{category.categoryName}}

            </h2>




            <p>

                {{category.description}}

            </p>





           <button 
(click)="viewProducts(category.id)">
    View Products
</button>



        </div>



    </div>





    <!-- Empty -->

    <div 
    class="empty"
    *ngIf="!loading && categories.length === 0">


        No categories found.


    </div>



</div>
