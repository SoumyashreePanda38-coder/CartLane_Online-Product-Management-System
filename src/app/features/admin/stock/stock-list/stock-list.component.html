<div class="stock-container">

    <!-- Header -->
    <div class="page-header">

        <div>
            <h2>Stock Management</h2>
            <p>Manage product inventory</p>
        </div>

        <button class="btn-primary" routerLink="/admin/stocks/add">

            <i class="fa-solid fa-plus"></i>
            Add Stock

        </button>

    </div>

    <!-- Loading -->
    <div class="loading" *ngIf="loading">

        Loading stocks...

    </div>

    <!-- Table -->
    <div class="table-container" *ngIf="!loading">

        <table>

            <thead>

                <tr>

                    <th>Stock ID</th>
                    <th>Product ID</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Updated At</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr *ngFor="let stock of stocks">

                    <td>{{ stock.stockId }}</td>

                    <td>{{ stock.id }}</td>

                    <td>{{ stock.productName }}</td>

                    <td>

                        <span class="badge" [ngClass]="{
                                'low-stock': stock.quantity <= 10,
                                'good-stock': stock.quantity > 10
                            }">

                            {{ stock.quantity }}

                        </span>

                    </td>

                    <td>

                        {{ stock.updatedAt | date:'dd MMM yyyy, hh:mm a' }}

                    </td>

                    <td class="actions">

                        <button class="btn-view" [routerLink]="['/admin/stocks/history', stock.id]">

                            <i class="fa-solid fa-eye"></i>

                        </button>
                        <button class="btn-edit" [routerLink]="['/admin/stocks/edit', stock.stockId]">

                            <i class="fa-solid fa-pen"></i>

                        </button>

                        <button class="btn-delete" (click)="deleteStock(stock.stockId)">

                            <i class="fa-solid fa-trash"></i>

                        </button>

                    </td>

                </tr>

                <tr *ngIf="stocks.length === 0">

                    <td colspan="6" class="no-data">

                        No stock records found.

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
