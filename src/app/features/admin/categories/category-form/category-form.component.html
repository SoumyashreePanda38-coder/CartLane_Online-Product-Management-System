<
<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>

                {{isEdit ? 'Update Category' : 'Add New Category'}}

            </h3>

        </div>

        <div class="card-body">

            <form (ngSubmit)="saveCategory()">

                <div class="mb-3">

                    <label class="form-label">

                        Category Name

                    </label>

                    <input
                        class="form-control"
                        [(ngModel)]="category.categoryName"
                        name="categoryName"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Description

                    </label>

                    <textarea
                        class="form-control"
                        rows="4"
                        [(ngModel)]="category.description"
                        name="description">

                    </textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Image URL

                    </label>

                    <input
                        class="form-control"
                        [(ngModel)]="category.imageUrl"
                        name="imageUrl">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Status

                    </label>

                    <select
                        class="form-select"
                        [(ngModel)]="category.status"
                        name="status">

                        <option value="ACTIVE">ACTIVE</option>

                        <option value="INACTIVE">INACTIVE</option>

                    </select>

                </div>

                <button
                    class="btn btn-success">

                    {{isEdit ? 'Update Category' : 'Save Category'}}

                </button>

            </form>

        </div>

    </div>

</div>
